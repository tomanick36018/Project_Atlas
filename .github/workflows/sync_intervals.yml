name: Sync Intervals Data

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      - name: Download repository
        uses: actions/checkout@v4

      - name: Haal activiteiten op
        env:
          API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          curl \
          --user "API_KEY:$API_KEY" \
          -H "User-Agent: performance-dashboard" \
          "https://intervals.icu/api/v1/athlete/0/activities?oldest=2025-01-01" \
          -o data/activities.json

      - name: Bewaar nieuwe data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/activities.json
          git commit -m "Update Intervals data" || exit 0
          git push

      - name: Maak fitness analyse
        run: |
          python scripts/create_summary.py
          
      - name: Maak performance analyse
        run: |
          python scripts/create_performance.py
          
      - name: Bewaar analyse
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/fitness_summary.json
          git commit -m "Update fitness summary" || exit 0
          git push
