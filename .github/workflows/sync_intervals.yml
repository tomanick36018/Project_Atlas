name: Sync Intervals Data

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:
    inputs:
      sport_preference:
        description: 'Sportvoorkeur voor vandaag'
        required: false
        type: choice
        options:
          - Geen voorkeur (Auto)
          - Fietsen
          - Lopen
          - Rust / Herstel
        default: 'Geen voorkeur (Auto)'
      athlete_notes:
        description: 'Persoonlijke opmerkingen (bijv. gevoel, specifieke feedback)'
        required: false
        type: string
        default: ''
      sleep_score:
        description: 'Garmin Slaapscore (optioneel, anders automatisch)'
        required: false
        type: string
        default: ''
      hrv_status:
        description: 'Garmin HRV status (optioneel, anders automatisch)'
        required: false
        type: string
        default: ''
      is_post_workout:
        description: 'Is dit een beoordeling NA een training?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      - name: Download repository
        uses: actions/checkout@v4

      - name: Stel Python in
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installeer bibliotheken
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pydantic requests garminconnect

      - name: Haal activiteiten op
        env:
          API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          curl \
          --user "API_KEY:$API_KEY" \
          -H "User-Agent: performance-dashboard" \
          "https://intervals.icu/api/v1/athlete/0/activities?oldest=2025-01-01" \
          -o data/activities.json

      - name: Haal power streams op
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python scripts/get_power_streams.py

      - name: Haal Garmin data op
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python scripts/get_garmin_data.py

      - name: Maak fitness analyse
        run: |
          python scripts/create_summary.py
          
      - name: Maak dagelijkse samenvatting
        run: |
         python scripts/create_daily_summary.py
         
      - name: Maak trainingsblok
        run: |
         python scripts/create_training_blocks.py
          
      - name: Maak performance analyse
        run: |
          python scripts/create_performance.py

      - name: Maak coach input
        run: |
          python scripts/create_coach_input.py
          
      - name: Maak coach analyse
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPORT_PREFERENCE: ${{ github.event.inputs.sport_preference }}
          ATHLETE_NOTES: ${{ github.event.inputs.athlete_notes }}
          SLEEP_SCORE: ${{ github.event.inputs.sleep_score }}
          HRV_STATUS: ${{ github.event.inputs.hrv_status }}
          IS_POST_WORKOUT: ${{ github.event.inputs.is_post_workout }}
        run: |
          python scripts/create_coach_analysis.py    
          
      - name: Bewaar alle data en analyses
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md data/activities.json data/power_streams.json data/garmin_data.json data/fitness_summary.json data/performance_trends.json data/daily_summary.json data/training_blocks.json data/coach_input.json data/coach_analysis.json
          git commit -m "Automatische update van Intervals & Garmin data en coach-analyse" || exit 0
          
          git pull --rebase origin main
          git push
