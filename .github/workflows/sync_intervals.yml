name: Sync Intervals Data

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:
    inputs:
      sport_preference:
        description: 'Sportvoorkeur voor vandaag'
        required: false
        type: choice
        options:
          - Geen voorkeur (Auto)
          - Fietsen
          - Lopen
          - Rust / Herstel
        default: 'Geen voorkeur (Auto)'
      athlete_notes:
        description: 'Persoonlijke opmerkingen (bijv. HRV is laag, benen voelen zwaar, slechte slaap)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      - name: Download repository
        uses: actions/checkout@v4

      - name: Stel Python in
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installeer bibliotheken
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pydantic requests

      - name: Haal activiteiten op
        env:
          API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          curl \
          --user "API_KEY:$API_KEY" \
          -H "User-Agent: performance-dashboard" \
          "https://intervals.icu/api/v1/athlete/0/activities?oldest=2025-01-01" \
          -o data/activities.json

      - name: Haal power streams op
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: |
          python scripts/get_power_streams.py

      # (De tussentijdse push-stap is hier verwijderd voor meer snelheid en stabiliteit)

      - name: Maak fitness analyse
        run: |
          python scripts/create_summary.py
          
      - name: Maak dagelijkse samenvatting
        run: |
         python scripts/create_daily_summary.py
         
      - name: Maak trainingsblok
        run: |
         python scripts/create_training_blocks.py
          
      - name: Maak performance analyse
        run: |
          python scripts/create_performance.py

      - name: Maak coach input
        run: |
          python scripts/create_coach_input.py
          
      - name: Maak coach analyse
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPORT_PREFERENCE: ${{ github.event.inputs.sport_preference }}
          ATHLETE_NOTES: ${{ github.event.inputs.athlete_notes }}
        run: |
          python scripts/create_coach_analysis.py    
          
      - name: Bewaar alle data en analyses
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # We voegen hier ALLE gewijzigde bestanden in één keer toe
          git add README.md data/activities.json data/power_streams.json data/fitness_summary.json data/performance_trends.json data/daily_summary.json data/training_blocks.json data/coach_input.json data/coach_analysis.json
          git commit -m "Automatische update van Intervals data en coach-analyse" || exit 0
          
          # Haal eventuele nieuwe code op die u zojuist heeft gepusht, om conflicten te vermijden
          git pull --rebase origin main
          
          # Push alles veilig naar GitHub
          git push
